name: CI Tests (uv + Container)

on: [push, pull_request]

jobs:
  unittest:
    runs-on: ubuntu-latest

    container:
      image: python:3.13.7-slim

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install OS dependencies
      run: apt-get update && apt-get install -y chromium-headless-shell unzip zip

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        python-version: "3.13.7"

    - name: Install dependencies
      run: uv sync --frozen --no-group device

    - name: Restore test .storage files
      run: |
        echo "${{ secrets.TEST_STORAGE_B64 }}" | base64 --decode > storage.zip
        unzip -o storage.zip -d ./python/tests/.storage || true

    - name: Run unittests
      run: uv run python -m unittest discover .

    - name: Zip test outputs
      # -r for recursive, -q for quiet (hides file list in logs)
      run: zip -r test-output.zip ./.test-output

    - name: Upload Test Output
      uses: actions/upload-artifact@v4
      with:
        name: test-output-archive
        path: test-output.zip
        retention-days: 10
