name: CI Tests (uv + Container)

on: [push, pull_request]

jobs:
  unittest: # Line 6: Job ID
    runs-on: ubuntu-latest
    
    # Line 10: container must be at this indentation level
    container:
      # Line 12: Ensure 'image:' is indented under 'container:'
      image: python:3.13.7-slim

    steps:
      - name: Checkout code
        uses: [actions/checkout@v4](https://github.com)

      - name: Install uv
        uses: [astral-sh/setup-uv@v5](https://github.com/marketplace/actions/astral-sh-setup-uv)
        with:
          enable-cache: true
          python-version: "3.13.7"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run unittests
        run: uv run python -m unittest discover tests
